name: Day 10 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r day9-security/requirements.txt

   - name: Build Docker Image
  run: |
    docker build -t meetmux-test-image .

- name: Run Container (Test App)
  run: |
    docker run -d -p 5000:5000 meetmux-test-image
    sleep 5